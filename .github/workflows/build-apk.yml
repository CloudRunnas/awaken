name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true

      - run: flutter pub get
      - run: bash scripts/patch_android_namespaces.sh
      - run: bash scripts/patch_on_audio_edit_kotlin.sh
      - run: bash scripts/patch_legacy_compile_sdk.sh
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter build apk --release --split-per-abi --build-number=${{ github.run_number }} \
          --dart-define=DEEPL_PROXY_URL=${{ vars.DEEPL_PROXY_URL }} \
          --dart-define=PHOENIX_TRANSLATION_API_KEY=${{ secrets.PHOENIX_TRANSLATION_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk-splits
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Deploy armeabi-v7a to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:271519645394:android:e5c63e435db14df04d370b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: MikesAppTester
          file: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} (${{ github.sha }}) — armeabi-v7a (32-bit ARM)
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}

      - name: Deploy arm64-v8a to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:271519645394:android:e5c63e435db14df04d370b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: MikesAppTester
          file: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} (${{ github.sha }}) — arm64-v8a (64-bit ARM)
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}

      - name: Deploy x86_64 to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:271519645394:android:e5c63e435db14df04d370b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: MikesAppTester
          file: build/app/outputs/flutter-apk/app-x86_64-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} (${{ github.sha }}) — x86_64 (Emulator / Intel)
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}
