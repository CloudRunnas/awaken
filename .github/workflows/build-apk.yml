name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true

      - run: flutter pub get
      - run: bash scripts/patch_android_namespaces.sh
      - run: bash scripts/patch_on_audio_edit_kotlin.sh
      - run: bash scripts/patch_legacy_compile_sdk.sh
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: flutter test integration_test/packages/

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"
          cache: true

      - run: flutter pub get
      - run: bash scripts/patch_android_namespaces.sh
      - run: bash scripts/patch_on_audio_edit_kotlin.sh
      - run: bash scripts/patch_legacy_compile_sdk.sh
      - run: flutter build apk --release --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:271519645394:android:e5c63e435db14df04d370b
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: MikesAppTester
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} (${{ github.sha }})
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}
