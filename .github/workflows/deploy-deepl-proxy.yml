name: Deploy DeepL Proxy

on:
  push:
    branches: [main]
    paths:
      - 'infra/deepl-proxy/**'
      - '.github/workflows/deploy-deepl-proxy.yml'
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'infra/deepl-proxy/**'
      - '.github/workflows/deploy-deepl-proxy.yml'

concurrency:
  group: deploy-deepl-proxy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy script exists
        run: test -f infra/deepl-proxy/deploy.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy Lambda proxy
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          PHOENIX_TRANSLATION_API_KEY: ${{ secrets.PHOENIX_TRANSLATION_API_KEY }}
        run: bash infra/deepl-proxy/deploy.sh

      - name: Publish Function URL
        run: |
          if [ -f infra/deepl-proxy/.function_url ]; then
            FUNCTION_URL=$(cat infra/deepl-proxy/.function_url)
            echo "DEEPL_PROXY_URL=$FUNCTION_URL" >> "$GITHUB_ENV"
            echo "### DeepL Proxy URL" >> "$GITHUB_STEP_SUMMARY"
            echo "\`$FUNCTION_URL\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update repository variable
        if: env.DEEPL_PROXY_URL != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: gh variable set DEEPL_PROXY_URL --body "$DEEPL_PROXY_URL"

      - name: Smoke test translation
        if: env.DEEPL_PROXY_URL != ''
        env:
          PHOENIX_TRANSLATION_API_KEY: ${{ secrets.PHOENIX_TRANSLATION_API_KEY }}
        run: |
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST "$DEEPL_PROXY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Phoenix-Api-Key: $PHOENIX_TRANSLATION_API_KEY" \
            -d '{"text":"Hello","target_lang":"DE"}')
          echo "$response"
          status="${response##*HTTP_STATUS:}"
          body="${response%HTTP_STATUS:*}"
          if [[ "$status" != "200" ]]; then
            echo "Smoke test failed with HTTP $status"
            exit 1
          fi
          echo "$body" | grep -q '"translations"' || (echo "Missing translations in response" && exit 1)
